{% block title %}{{ product_name }}{% endblock %}

{% block page %}

    <div class="product-info">
        <img src="/{{ product_info[1] }}" width="500">
        <p>{{ product_info[2] }}</p>
        <p>{{ product_info[3] }}</p>

        <a href="/add_to_cart/{{ product_info[0] }}"><button>Добавить в корзину</button></a>
    </div>
</body>
{% endblock %}
